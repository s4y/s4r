const createAudioAnalyser = () => {
  const analyser = window.top.audioAnalyser || (() => {
    const ac = window.ac = new (window.AudioContext || window.webkitAudioContext)();
    let source;
    const checkState = () => {
      if (ac.state === 'suspended') {
        enableAudioContext.classList.add('visible');
        return;
      }

      enableAudioContext.classList.remove('visible');

      if (source)
        return;
      navigator.mediaDevices.getUserMedia({
        video: false,
        audio: {
          noiseSuppression: false,
          echoCancellation: false,
        },
      })
      .then(s => {
        source = ac.createMediaStreamSource(s);
        source.connect(analyser);
      });

    };
    enableAudioContext.addEventListener('click', e => {
      ac.resume();
    });

    ac.addEventListener('statechange', checkState);
    checkState();

    const analyser = ac.createAnalyser();
    analyser.smoothingTimeConstant = 0.3;
    try {
      analyser.fftSize = 4096;
      // analyser.fftSize = 2048;
      // analyser.fftSize = 8192;
      // analyser.fftSize = 16384;
    } catch (e) {
      console.log('fft maxed out at', analyser.fftSize);
    }
    ac.resume();
    return analyser;
  })();

  const updateable = (obj, update) => {
    let lastUpdateTime = 0;
    return () => {
      let now = performance.now();
      if (this.lastUpdateTime != now) {
        update(obj);
        this.lastUpdateTime = now;
      }
      return obj;
    };
  };

  const kMaxFrequency = 20000;
  const getByteFreqData = updateable(new Uint8Array(Math.floor(kMaxFrequency / window.top.ac.sampleRate * (analyser.fftSize / 2))), data => {
    analyser.getByteFrequencyData(data);
  });
  const getByteTimeData = updateable(new Uint8Array(2048), data => {
    analyser.getByteTimeDomainData(data);
  });

  return {
    get byteFreqData() { return getByteFreqData(); },
    get byteTimeData() { return getByteTimeData(); },
  };
};

const createFB = (w, h) => {
  const tex = gl.createTexture();
  if (!w)
    w = gl.drawingBufferWidth;
  if (!h)
    h = gl.drawingBufferHeight;
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(
    gl.TEXTURE_2D, 0, gl.RGBA,
    w, h, 0,
    gl.RGBA, gl.UNSIGNED_BYTE, null
  );
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

  const fb = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);

  gl.bindTexture(gl.TEXTURE_2D, null);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);

  return {
    tex,
    fb,
    w,
    h,
    aspect: w / h,
    clear() {
      gl.texImage2D(
        gl.TEXTURE_2D, 0, gl.RGBA,
        w, h, 0,
        gl.RGBA, gl.UNSIGNED_BYTE, null
      );
    },
    attach(id) {
      gl.activeTexture(gl['TEXTURE' + id]);
      gl.bindTexture(gl.TEXTURE_2D, tex);
    },
    draw() {
      // gl.generateMipmap(gl.TEXTURE_2D);
    },
    drawInto(f) {
      const oldViewport = gl.getParameter(gl.VIEWPORT);
      const oldFb = gl.getParameter(gl.FRAMEBUFFER_BINDING);
      try {
        gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
        gl.viewport(0, 0, w, h);
        gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT | gl.STENCIL_BUFFER_BIT);
        f();
      } finally {
        gl.bindFramebuffer(gl.FRAMEBUFFER, oldFb);
        gl.viewport(...oldViewport);
      }
    },
  };
}

const createFBPair = (w, h) => {
  const fbs = [createFB(w, h), createFB(w, h)];
  return {
    w,
    h, 
    get tex() {
      return fbs[0].tex;
    },
    draw() {
      return fbs[0].draw();
    },
    drawInto(f) {
      fbs.reverse();
      fbs[0].drawInto(f);
    },
  };
};

const glTypeFromBinaryOperationOnTypes = (l, r) => {
  const lBase = l.replace(/\d/, '');
  const rBase = r.replace(/\d/, '');
  switch (lBase) {
    case 'float':
      switch (rBase) {
        case 'float':
          return l;
        case 'vec':
        case 'mat':
          return r;
      }
      break;
    case 'vec':
      return l;
    case 'mat':
      switch (rBase) {
        case 'float':
          return l;
        case 'vec':
        case 'mat':
          if (l == r)
            return l;
          break;
      }
      break;
  }
  throw new Error(`Unknown type pair for binary op: ${l}, ${r}`);
}

const wrapFragShader = (body, defs) => `
precision highp float;

varying vec3 p;

const float PI = asin(1.0) * 2.;

float easeInOutQuad(float t) {
  return t<.5 ? 2.*t*t : -1.+(4.-2.*t)*t;

// https://stackoverflow.com/questions/15095909/from-rgb-to-hsv-in-opengl-glsl
vec3 rgb2hsv(vec3 c) {
    vec4 K = vec4(0.0, -1.0 / 3.0, 2.0 / 3.0, -1.0);
    vec4 p = mix(vec4(c.bg, K.wz), vec4(c.gb, K.xy), step(c.b, c.g));
    vec4 q = mix(vec4(p.xyw, c.r), vec4(c.r, p.yzx), step(p.x, c.r));

    float d = q.x - min(q.w, q.y);
    float e = 1.0e-10;
    return vec3(abs(q.z + (q.w - q.y) / (6.0 * d + e)), d / (q.x + e), q.x);
}

vec3 hsv2rgb(vec3 c)
{
    vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
    vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
    return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
}

${defs || ""}

void main() {
${body}
}
`;

const parse = s => {
  const tokens = [];
  const ops = [];
  const line = [];
  let inComment = false;
  let inDirective = false;
  for (const [chunk] of (s + '\n').matchAll(/(\s+|#|\S+)/g)) {
    if (chunk === '#') {
      inComment = true;
      continue;
    }
    const tok = getToken(chunk);
    if (inComment) {
      if (tok.breaksLine)
        inComment = false;
      else
        continue;
    }
    if (tok.type === 'bail')
      break;
    if (tok.type === 'whitespace') {
      if (tok.breaksLine && (!inDirective || /\n$/.test(tok.text))) {
        if (line.length && line[0].type == 'directive') {
          if (line[0].value === 'def') {
            ops.push({
              type: 'define',
              name: line[1].value,
              ops: line.slice(2),
            });
          } else if (line[0].value === 'fn') {
            if (line.length < 3)
              throw new Error("`:fn` used with wrong number of arguments. Expected name, arity, and (optional) return type.");
            const name = line[1].value;
            const glName = name.match(/^[^.]+/)[0];
            const arity = line[2].value;
            const type = line[3] && line[3].value;
            ops.push({
              type: 'define',
              name,
              ops: [{ type: 'native', fn: stack => {
                const args = stack.splice(stack.length-arity, arity);
                stack.push({
                  type: 'invocation',
                  glName,
                  dataType: type || args[0].dataType,
                  const: args.reduce((acc, arg) => acc && arg.const, true),
                  args,
                });//`${glName}(${stack.splice(stack.length-arity, arity).join(', ')})`);
              }}],
            });
          } else if (line[0].value === 'loop') {
            const count = line[1].value;
            ops.push({
              type: 'loop',
              count,
              ops: line.slice(2),
            });
          } else if (line[0].value === 'freeze') {
            const varType = line[1].value;
            const word = line[2].value;
            ops.push({
              type: 'freeze',
              varType,
              word,
            });
          } else {
            throw new Error('bad directive');
          }
        } else {
          ops.push(...line);
        }
        line.length = 0;
      }
    } else {
      if (tok.type == 'directive')
        inDirective = true;
      line.push(tok);
    }
  }
  return ops;
}

let runContinuously = true;
let timeVelocity = 1;
let t = 0;
let startTime = sessionStorage.startTime;
if (!startTime)
  startTime = sessionStorage.startTime = +new Date();
let tref = startTime;
let running = false;

const kickstart = () => {
  if (running)
    return;
  requestAnimationFrame(handleAnimationFrame);
  running = true;
}

const handleAnimationFrame = () => {
  const now = +new Date();
  if (timeVelocity === 1) {
    t += now - tref;
  } else if (timeVelocity < 0.05) {
    timeVelocity = 0;
  } else {
    t += (now - tref) * timeVelocity
  }
  tref = now;
  if (!runContinuously && timeVelocity > 0)
    timeVelocity *= 0.99;

  draw(t/1000);
  if (!timeVelocity) {
    running = false;
  } else {
    requestAnimationFrame(handleAnimationFrame);
  }
}

const compile = parseTree => {
  let uniform_seq = 0;
  let texture_seq = 0;
  let var_seq = 0;
  let preamble = '';
  let tasks = [];
  let stack = [];
  let defs = {
    t: [{ type: 'native', fn: stack => { stack.push({
      type: 'symbol',
      dataType: 'float',
      const: false,
      value: 't',
    }); }}],
    p: [{ type: 'native', fn: stack => { stack.push({
      type: 'symbol',
      dataType: 'vec3',
      const: false,
      value: 'p',
    }); }}],
    aspect: [{ type: 'native', fn: stack => { stack.push({
      type: 'symbol',
      dataType: 'float',
      const: false,
      value: 'aspect',
    }); }}],
    midi: [{ type: 'native', fn: (stack, tag) => {
      const u_name = `u_${uniform_seq++}`;
      tasks.push({
        type: 'set_uniform',
        name: u_name,
        valueType: 'float',
        get value() { return globals.midi[tag]; },
      });
      stack.push({
        type: 'symbol',
        dataType: 'float',
        const: false,
        value: u_name,
      });
    }}],
    fb: [{ type: 'native', fn: (stack, tag) => {
      if (!globals.framebuffers[tag])
        globals.framebuffers[tag] = createFBPair();
      const u_name = `u_${uniform_seq++}`;
      tasks.push({
        type: 'set_uniform',
        name: u_name,
        valueType: 'sampler2D',
        value: globals.framebuffers[tag],
      });
      stack.push({
        type: 'symbol',
        dataType: 'sampler2D',
        const: false,
        value: u_name,
      });
    }}],
    // dims: [{ type: 'native', fn: stack => {
    //   stack.push(gl.drawingBufferWidth);
    //   stack.push(gl.drawingBufferHeight);
    // }}],
    PI: [{ type: 'native', fn: stack => { stack.push({
      type: 'symbol',
      dataType: 'float',
      const: true,
      value: 'PI',
    }); }}],
    draw: [{ type: 'native', fn: stack => {
      tasks.push({
        type: 'draw',
        frag: stack.pop(),
      });
      preamble = '';
    }}],
    drawto: [{ type: 'native', fn: (stack, tag) => {
      const target = globals.framebuffers[tag] || (globals.framebuffers[tag] = createFBPair());
      tasks.push({
        type: 'draw',
        target,
        frag: stack.pop(),
      });
      preamble = '';
    }}],
    tvel: [{ type: 'native', fn: stack => {
      const newTimeVelocity = +stack.pop();
      if (isNaN(newTimeVelocity))
        return;
      timeVelocity = newTimeVelocity;
      kickstart();
    }}],
    st: [{ type: 'native', fn: stack => {
      if (!globals.audioAnalyser)
        globals.audioAnalyser = createAudioAnalyser();
      const {audioAnalyser} = globals;
      if (typeof stack[stack.length-1].value != 'number') {
        const textureID = texture_seq++;
        if (!globals.framebuffers.st)
          globals.framebuffers.st = createFB(audioAnalyser.byteTimeData.length, 1);
        tasks.push({
          type: 'set_uniform',
          name: 'u_audio_zero_crossing_time',
          valueType: 'float',
          get value() {
            const {byteTimeData} = audioAnalyser;
            for (let i = 0; i < byteTimeData.length; i++) {
              if (i > 0 && byteTimeData[i-1] < 127 && byteTimeData[i] >= 127) {
                return i / byteTimeData.length;
              }
            }
            return 0;
          },
        });
        tasks.push({
          type: 'set_uniform',
          name: 'u_audio_time',
          valueType: 'sampler2D',
          value: {
            tex: globals.framebuffers.st.tex,
            draw() {
              gl.texImage2D(
                gl.TEXTURE_2D, 0, gl.LUMINANCE,
                audioAnalyser.byteTimeData.length, 1, 0,
                gl.LUMINANCE, gl.UNSIGNED_BYTE, audioAnalyser.byteTimeData
              );
            },
          }
        });
        stack.push({ type: "symbol", dataType: "float", const: false, value: 'u_audio_zero_crossing_time' });
        doOps(parse(`+ 2 / 0 vec2 fb'st swap texture2D .x`));
      } else {
        const bucket = stack.pop();
        const bucketNumber = Math.floor(+bucket.value * audioAnalyser.byteTimeData.length);
        const u_name = `u_${uniform_seq++}`;
        tasks.push({
          type: 'set_uniform',
          name: u_name,
          valueType: 'float',
          get value() {
            return audioAnalyser.byteTimeData[bucketNumber]/255;
          }
        });
        stack.push({ type: "symbol", dataType: "float", const: false, value: u_name });
      }
    }}],
    sf: [{ type: 'native', fn: stack => {
      if (!globals.audioAnalyser)
        globals.audioAnalyser = createAudioAnalyser();
      const {audioAnalyser} = globals;
      if (typeof stack[stack.length-1].value != 'number') {
        const textureID = texture_seq++;
        if (!globals.framebuffers.sf)
          globals.framebuffers.sf = createFB(audioAnalyser.byteFreqData.length, 1);
        tasks.push({
          type: 'set_uniform',
          name: 'u_freq',
          valueType: 'sampler2D',
          value: {
            tex: globals.framebuffers.sf.tex,
            draw() {
              gl.texImage2D(
                gl.TEXTURE_2D, 0, gl.LUMINANCE,
                audioAnalyser.byteFreqData.length, 1, 0,
                gl.LUMINANCE, gl.UNSIGNED_BYTE, audioAnalyser.byteFreqData
              );
            },
          }
        });
        doOps(parse(`0 vec2 fb'sf swap texture2D .x`));
      } else {
        const bucket = stack.pop();
        const bucketNumber = Math.floor(+bucket.value * audioAnalyser.byteFreqData.length);
        const u_name = `u_${uniform_seq++}`;
        tasks.push({
          type: 'set_uniform',
          name: u_name,
          valueType: 'float',
          get value() {
            return audioAnalyser.byteFreqData[bucketNumber]/255;
          }
        });
        stack.push({ type: "symbol", dataType: "float", const: false, value: u_name });
      }
    }}],
    pause: [{ type: 'native', fn: stack => {
      timeVelocity = 0;
    }}],
    pad_x: [{ type: 'native', fn: stack => {
      const whichPad = +stack.pop();
      const u_name = `u_${uniform_seq++}`;
      if (isNaN(whichPad)) {
      } else {
        tasks.push({
          type: 'set_uniform',
          name: u_name,
          valueType: 'float',
          get value() {
            return pads[whichPad] && pads[whichPad].x || 0;
          },
        });
      }
      stack.push(u_name);
    }}],
    pad_y: [{ type: 'native', fn: stack => {
      const whichPad = +stack.pop();
      const u_name = `u_${uniform_seq++}`;
      if (isNaN(whichPad)) {
      } else {
        tasks.push({
          type: 'set_uniform',
          name: u_name,
          valueType: 'float',
          get value() {
            return pads[whichPad] && pads[whichPad].y || 0;
          },
        });
      }
      stack.push(u_name);
    }}],
    pad: [{ type: 'native', fn: stack => {
      const whichPad = +stack.pop();
      const u_name = `u_${uniform_seq++}`;
      if (isNaN(whichPad)) {
      } else {
        let interpVal = pads[whichPad] && pads[whichPad].pressed ? 1 : 0;
        tasks.push({
          type: 'set_uniform',
          name: u_name,
          valueType: 'float',
          get value() {
            const target = pads[whichPad] && pads[whichPad].pressed ? 1 : 0;
            interpVal += (target - interpVal) * 0.1;
            return interpVal;
          }
        });
      }
      stack.push(u_name);
    }}],
    '{': [{ type: 'native', fn: stack => {
      defs = Object.create(defs);
    }}],
    '}': [{ type: 'native', fn: stack => {
      defs = Object.getPrototypeOf(defs);
    }}],
  };
  const doOps = (ops, tag) => {
    for (const op of ops) {
      if (op.type === 'define') {
        defs[op.name] = op.ops;
      } else if (op.type === 'loop') {
        const { count, ops } = op;
        // const l_name = `l_${var_seq++}`;
        const initialValue = stack.pop();
        stack.push({ type: "loopVar", dataType: initialValue.dataType, const: false, });
        doOps(ops);
        const body = stack.pop();
        // preamble += `${varType} ${l_name} = ${l_val}; for (int i = 0; i < ${count}; i++) ${l_name} = ${body};\n`;
        stack.push({ type: "loop", dataType: initialValue.dataType, initialValue, count, body });
        // stack.push({ type: "loop", dataType: l_val.dataType, value: l_name });
      } else if (op.type === 'freeze') {
        // no-op
      } else if (op.type === 'operator') {
        const right = stack.pop();
        const left = stack.pop();
        if (!left || !right)
          throw new Error(`Null argument to operator: ${left} ${op.value} ${right}`);
        if (!left.dataType || !right.dataType) {
          throw new Error(`Something unexpected on the stack: ${JSON.stringify(left)}, ${JSON.stringify(right)}`);
        }
        const dataType = glTypeFromBinaryOperationOnTypes(left.dataType, right.dataType);
        stack.push({
          type: 'operator',
          value: op.value,
          dataType, left, right,
          const: left.const && right.const,
        });
        // stack.push(`(${[stack.pop(), op.value, stack.pop()].reverse().join(' ')})`);
      } else if (op.type === 'number') {
        // let ns = op.value.toString();
        // if (ns.indexOf('.') === -1)
        //   ns += '.';
        // stack.push(ns);
        stack.push({
          type: 'literal',
          dataType: 'float',
          const: true,
          value: op.value,
        });
      } else if (op.type === 'word') {
        const def = defs[op.value];
        if (def) {
          doOps(def, op.tag);
        } else {
          throw new Error(`"${op.value}" is not defined.`);
        }
      } else if (op.type === 'native') {
        op.fn(stack, tag);
      } else if (op.type === 'swizzle') {
        const components = op.components;
        const value = stack.pop();
        const dataType = components.length > 1 ? `vec${components.length}` : 'float';
        stack.push({
          type: 'swizzle',
          dataType,
          const: value.const,
          components,
          value,
        });
        // stack.push(`(${stack.pop()}).${op.components}`);
      } else if (op.type === 'assign') {
        const v = stack.pop();
        defs[op.name] = [{ type: 'native', fn: stack => { stack.push(v); }}];
      } else {
        throw new Error('idk what this thing is: ' + JSON.stringify(op));
      }
    }
  };
  doOps(parseTree);
  return tasks;
}

const optimizeTree = (tree, depth) => {
  const extracted = [];
  const optimizedNodes = new Map();

  const checkDupes = () => {
    const dupes = {};
    for (const expr of extracted) {
      const j = JSON.stringify(expr);
      if (j in dupes) {
        console.log(extracted);
        throw new Error(`Duplicate expr: ${j}`);
      }
      dupes[j] = true;
    }
  };

  for (let i = 0; i < 100 /* max passes */; i++) {
    const metadata = {};
    // const metadataRefs = new Map();
    const traverse = (node, depth) => {
      if (node.type == 'reference')
        return true;
      if (node.type == 'literal')
        return true;
      if (node.type == 'symbol')
        return true;
      if (node.type == 'loopVar')
        return false;
      let json;
      const meta = /* metadataRefs.get(node) || */ metadata[json = JSON.stringify(node)] || (metadata[json] = {
        node, count: 0, bestDepth: depth, allowed: true,
      });
      // metadataRefs.set(node, meta);
      meta.count += 1;
      meta.bestDepth = Math.min(meta.bestDepth, depth);
      for (const k in node) {
        const v = node[k];
        if (Array.isArray(v)) {
          meta.allowed = v.reduce((allowed, node) => traverse(node, depth + 1) && allowed, meta.allowed);
        } else if (typeof v == 'object') {
          meta.allowed = traverse(v, depth + 1) && meta.allowed;
        }
      }
      return meta.allowed;
    };
    for (const expr of extracted)
      traverse(expr, 0);
    traverse(tree, 0);
    const minCountToOptimize = 2;
    const optimizationCandidatesByDepth = [];
    for (const k in metadata) {
      const v = metadata[k];
      if (v.count < minCountToOptimize)
        continue;
      if (!v.allowed)
        continue;
      const depthCandidates = optimizationCandidatesByDepth[v.bestDepth]
        || (optimizationCandidatesByDepth[v.bestDepth] = []);
      depthCandidates.push(v);
    }

    if (!optimizationCandidatesByDepth.length)
      break;

    for (const candidateList of optimizationCandidatesByDepth) {
      if (!candidateList)
        continue;
      checkDupes();
      for (const candidate of candidateList) {
        optimizedNodes.set(candidate.node, {
          type: "reference",
          id: extracted.push(candidate.node) - 1,
          const: candidate.node.const,
        });
      }
      break;
    }
    const matchRef = v => {
      const meta = /* metadataRefs.get(v) || */ metadata[JSON.stringify(v)];
      return meta && optimizedNodes.get(meta.node);
    };
    const rebuildTree = node => {
      const ret = {};
      for (const k in node) {
        const v = node[k];
        if (Array.isArray(v)) {
          ret[k] = v.map(v => matchRef(v) || rebuildTree(v));
        } else if (typeof v == 'object') {
          ret[k] = matchRef(v) || rebuildTree(v);
        } else {
          ret[k] = v;
        }
      }
      return ret;
    };
    for (let i = 0; i < extracted.length; i++)
      extracted[i] = rebuildTree(extracted[i]);
    tree = rebuildTree(tree);
  }
  return { tree, extracted };
}

const toGLSource = tree => {
  let decls = "";
  let loop_seq = 0;
  let loops = "";
  let loop_stack = [];
  let references = [];
  let depsMet = {};
  const serialize = node => {
    switch(node.type) {
      case "invocation":
        return `${node.glName}(${node.args.map(serialize).join(', ')})`;
        break;
      case "operator":
        return `(${serialize(node.left)} ${node.value} ${serialize(node.right)})`;
      case "swizzle":
        return `${serialize(node.value)}.${node.components}`;
      case "literal":
        let ns = node.value.toString();
        if (ns.indexOf('.') === -1)
          ns += '.';
        return ns;
      case "symbol":
        return node.value;
      case "reference":
        if (!depsMet[node.id])
          throw 'deps';
        return references[node.id];
      case "loopVar":
        return loop_stack[loop_stack.length-1];
      case "loop":
        const loop_var = `l_${loop_seq++}`;
        loop_stack.push(loop_var);
        try {
          loops += `${node.dataType} ${loop_var} = ${serialize(node.initialValue)}; for (int i = 0; i < ${node.count}; i++) ${loop_var} = ${serialize(node.body)};\n`;
        } finally {
          loop_stack.pop();
        }
        return loop_var;
      default:
        throw new Error(`Unknown AST node type: ${node.type}`);
    }
  };
  const optimized = optimizeTree(tree);
  for (let i = 0; i < optimized.extracted.length; i++) {
    const name = `var_${i}`;
    references.push(name);
  }
  for (;;) {
    let didEmit = false;
    for (let i = optimized.extracted.length - 1; i >= 0; i--) {
      if (depsMet[i])
        continue;
      const expr = optimized.extracted[i];
      try {
        const nPre = `${expr.const ? "const " : ""}${expr.dataType} ${references[i]} = ${serialize(expr, depsMet)}; \n`;
        decls += nPre;
        depsMet[i] = true;
        didEmit = true;
      } catch (e) {
        if (e === 'deps') {
          continue;
        }
      }
    }
    if (!didEmit)
      break;
  }
  const expr = serialize(optimized.tree);
  return { preamble: decls + loops, expr, }
};

const updateFrag = value => {
  let newParseTree;
  try {
    newParseTree = parse(value);
  } catch (e) {
    console.error(e);
    return;
  }
  // console.log(newParseTree);
  const newTasks = compile(newParseTree);

  const newRuntimeTasks = [];
  let pendingUniforms;
  for (const task of newTasks) {
    if (!pendingUniforms) {
      pendingUniforms = {
        t: {
          valueType: 'float',
          get value() {
            return t/1000;
          }
        },
        aspect: {
          valueType: 'float',
          get value() {
            return gl.drawingBufferWidth / gl.drawingBufferHeight;
          }
        },
      };
    }
    if (task.type == 'draw') {
      let currentProg = null;

      let defs = "";
      let textures = [];
      const uniforms = pendingUniforms;
      for (const k in uniforms) {
        const u = uniforms[k];
        defs += `
          uniform ${u.valueType} ${k};
        `;
      }
      pendingUniforms = null;

      console.log('transpiling:', task.frag);
      const {preamble, expr: exprText} = toGLSource(task.frag);
      const progText = `
        ${preamble}
        gl_FragColor = ${exprText};
      `;
      console.log('into:', progText);

      const prog = gl.createProgram();
      const shaderText = wrapFragShader(progText, defs);
      const fs = compileFragShader(shaderText);
      gl.attachShader(prog, vs);
      gl.attachShader(prog, fs);
      gl.linkProgram(prog);
      if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
        console.log(gl.getProgramInfoLog(prog));
        return;
      }
      const pLoc = gl.getUniformLocation(prog, "p_in");
      newRuntimeTasks.push(() => {
        gl.useProgram(prog);
        currentProg = prog;

        for (const k in uniforms) {
          const u = uniforms[k];
          const loc = gl.getUniformLocation(prog, k);
          const v = u.value;
          if (u.valueType === 'sampler2D') {
            const fb = u.value;
            let id = textures.indexOf(fb.tex);
            if (id < 0)
              id = textures.length;
            textures.push(fb.tex);
            gl.activeTexture(gl['TEXTURE' + id]);
            gl.bindTexture(gl.TEXTURE_2D, fb.tex);
            fb.draw();
            gl.uniform1i(loc, id);
          } else {
            gl.uniform1f(loc, u.value);
          }
        }

        gl.enableVertexAttribArray(pLoc);
        gl.vertexAttribPointer(pLoc, 3, gl.FLOAT, false, 0, 0);
        const doDraw = () => {
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, mesh.length / 3);
        };
        if (task.target)
          task.target.drawInto(doDraw);
        else
          doDraw();
      });
    } else if (task.type === 'set_uniform') {
      pendingUniforms[task.name] = {
        valueType: task.valueType,
        get value() { return task.value; }
      };
    }
  }
  runtimeTasks = newRuntimeTasks;
}

const getToken = text => {
  let tok = {};
  if (/'.+/.test(text)) {
    const idx = text.indexOf("'");
    tok.tag = text.substr(idx + 1);
    text = text.substr(0, idx);
  }
  if (/\s+/.test(text))
    return Object.assign({ type: 'whitespace', breaksLine: text.indexOf('\n') != -1, text }, tok);
  const numberValue = +text;
  if (/^bail\b/.test(text))
    return Object.assign({ type: 'bail' }, tok);
  if (!isNaN(numberValue))
    return Object.assign({ type: 'number', value: numberValue }, tok);
  if (text[0] === ':')
    return Object.assign({ type: 'directive', value: text.substr(1) }, tok);
  if (/^\./.test(text))
    return Object.assign({ type: 'swizzle', components: text.substr(1) }, tok);
  if (/^=/.test(text))
    return Object.assign({ type: 'assign', name: text.substr(1) }, tok);
  if (!/^[a-zA-Z{}]/.test(text))
    return Object.assign({ type: 'operator', value: text }, tok);
  return Object.assign({ type: 'word', value: text }, tok);;
};

const initEditor = (rootEl, cb) => {
  const ta = rootEl.querySelector('.ta');
  const underlay = rootEl.querySelector('.underlay');
  const overlay = rootEl.querySelector('.overlay');
  const key = rootEl.dataset.doc;

  const transfer = () => {
    ta.style.height = `1px`;
    ta.style.height = `${ta.scrollHeight}px`;
    underlay.style.height = `${ta.scrollHeight}px`;
    overlay.style.height = `${ta.scrollHeight}px`;

    underlay.innerHTML = "";
    for (const line of ta.value.split('\n')) {
      if (line) {
        const bgEl = document.createElement('span');
        bgEl.textContent = line;
        underlay.appendChild(bgEl);
      }
      underlay.appendChild(document.createTextNode('\n'));
    }

    overlay.innerHTML = "";
    // const chunks = parse(ta.value);
    // for (const chunk of chunks) {
    //   const el = document.createElement('span');
    //   el.textContent = chunk.text;
    //   if (chunk.type === "number") {
    //     el.classList.add('number');
    //   }
    //     overlay.appendChild(el);
    // }
    const el = document.createElement('span');
    el.textContent = ta.value;
    overlay.appendChild(el);
    localStorage[key] = ta.value;
  }

  ta.addEventListener('keydown', e => {
    if (e.keyCode == 13 && e.metaKey) {
      e.preventDefault();
      window.dispatchEvent(new CustomEvent('sendbroadcast', { detail: {
        name: key,
        value: ta.value,
      }}));
      return;
    }
  });

  ta.addEventListener('input', e => {
    transfer();
    try {
      cb();
    } catch (e) {
      console.error(e);
    }
  });

  ta.value = localStorage[key];
  transfer();

  return {
    get name() { return key; },
    get value(){ return ta.value; },
    set value(v){ ta.value = v; this.poke(); },
    poke() { transfer(); },
  };
};

const editors = [];
const onEditorChanged = () => {
  try {
    updateFrag(editors.map(e => e.value).join('\n'));
    kickstart();
  } catch (e) {
    console.error(e);
  }
};
for (const el of document.querySelectorAll('.editor'))
  editors.push(initEditor(el, onEditorChanged));
onEditorChanged();

const initTabs = (rootEl, tabChanged) => {
  const updateVisibility = () => {
    for (const tabEl of rootEl.children) {
      const targetEl = document.querySelector(`[data-tab=${tabEl.textContent}`);
      if ('selected' in tabEl.dataset)
        targetEl.dataset.tabSelected = '';
      else
        delete targetEl.dataset.tabSelected;
    }
  };
  updateVisibility();
  for (const tabEl of rootEl.children) {
    const targetEl = document.querySelector(`[data-tab=${tabEl.textContent}`);
    tabEl.addEventListener('mousedown', e => {
      e.preventDefault();
      if ('selected' in tabEl.dataset)
        return;
      const selectedTab = rootEl.querySelector('[data-selected]');
      if (selectedTab)
        delete selectedTab.dataset.selected;
      tabEl.dataset.selected = '';
      updateVisibility();
      tabChanged();
    });
  }
};
const selectedTabChanged = () => {
  for (const ed of editors)
    ed.poke();
};
for (const el of document.querySelectorAll('.tabs'))
  initTabs(el, selectedTabChanged);
selectedTabChanged();
