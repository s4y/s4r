<!DOCTYPE html>
<style>

html, body {
  width: 100%;
  height: 100%;
}

body {
  margin: 0;
  background: black;
}

#c {
  position: absolute;
  display: block;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

#ed {
  font: 14px monospace;
  position: relative;
  display: flex;
  height: 100%;
}

body.view #ed {
  display: none;
}

#ed textarea {
  font: inherit;
  background: none;
  border: none;
  flex: 1;
  outline: none;
  resize: none;
  position: absolute;
}

#ed textarea, #ed #underlay, #ed #overlay {
  color: white;
  margin: 0;
  padding: 0.5em;
  box-sizing: border-box;
  width: 100%;
  height: 100%;
}

#ed #underlay, #ed #overlay {
  color: transparent;
  pointer-events: none;
  -webkit-user-select: none;
  user-select: none;
  position: absolute;
  white-space: pre-wrap;
}

#ed #underlay span {
  background: black;
  opacity: 0.8;
  box-shadow: 0 0 5px 5px black;
}
#ed #overlay .number {
  color: rgba(50, 10, 255, 255);
  cursor: pointer;
  pointer-events: auto;
  border-radius: 3px;
}

</style>
<canvas id=c></canvas>
<div id=ed>
  <div id=underlay></div>
  <textarea id=ta spellcheck=false></textarea>
  <div id=overlay></div>
</div>
<script>

const prog = location.search == '?view';

const gl = c.getContext('webgl', { alpha: false, powerPreference: prog ? 'high-performance' : 'low-power' });
gl.enable(gl.BLEND);
gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);


const mesh = new Float32Array([
  -1, 1, 0, -1, -1, 0,
  1, 1, 0, 1, -1, 0,
]);
const buffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
gl.bufferData(gl.ARRAY_BUFFER, mesh, gl.STATIC_DRAW);

const vs = gl.createShader(gl.VERTEX_SHADER);
let program;

const defaultProgram = `
:def unbal + .5 / 2.
:fn sin 1
:fn vec4 4
   
p.x
* 3
+ * t 3
unbal sin
draw vec4 x4

`;

const createAudioAnalyser = () => {
  const ac = new (window.AudioContext || window.webkitAudioContext)();
  const analyser = ac.createAnalyser();
  // analyser.smoothingTimeConstant = 0.2;
  ac.resume();

  navigator.mediaDevices.getUserMedia({
    video: false,
    audio: true,
    noiseSuppression: false,
    echoCancellation: false,
  })
  .then(s => {
    const source = ac.createMediaStreamSource(s);
    source.connect(analyser);
  });

  const updateable = (obj, update) => {
    let lastUpdateTime = 0;
    return () => {
      let now = performance.now();
      if (this.lastUpdateTime != now) {
        update(obj);
        this.lastUpdateTime = now;
      }
      return obj;
    };
  };

  const getByteFreqData = updateable(new Uint8Array(512), data => {
    analyser.getByteFrequencyData(data);
  });
  const getByteTimeData = updateable(new Uint8Array(1024), data => {
    analyser.getByteTimeData(data);
  });

  return {
    get byteFreqData() { return getByteFreqData(); },
    get byteTimeData() { return getByteTimeData(); },
  };
};

const macros = {
  draw(body) {
    return `gl_FragColor = ${body}`;
  },
  def(body) {
    this.head += body;
  },
};

const globals = {
};

const preprocessFragShader = s => {
  return s.replace(/^(\s*):(\S+)\s+(.+)$/mg, (m, ws, kw, body) => ws + macros[kw](body));
}

const wrapFragShader = (body, defs) => `
precision highp float;

varying vec3 p;

const float PI = asin(1.0) * 2.;

float easeInOutQuad(float t) {
  return t<.5 ? 2.*t*t : -1.+(4.-2.*t)*t;
}

${defs || ""}

void main() {
${body}
}
`;

ta.value = localStorage.prog || defaultProgram;

gl.shaderSource(vs, `
attribute vec3 p_in;
varying vec3 p;

void main() {
  p = p_in;
  gl_Position = vec4(p_in, 1.);
}
`);
gl.compileShader(vs);

let runtimeTasks = [];

const draw = t => {
  // const tLoc = gl.getUniformLocation(program, "t");
  // if (tLoc)
  //   gl.uniform1f(tLoc, t);
  // const pLoc = gl.getUniformLocation(program, "p_in");
  // gl.enableVertexAttribArray(pLoc);
  // gl.vertexAttribPointer(pLoc, 3, gl.FLOAT, false, 0, 0);
  // gl.drawArrays(gl.TRIANGLE_STRIP, 0, mesh.length / 3);
  for (const task of runtimeTasks)
    task();
}

const compileFragShader = s => {
  const fs = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fs, s);
  gl.compileShader(fs);
  if (gl.getShaderParameter(fs, gl.COMPILE_STATUS))
    return fs;
  console.log(s);
  console.log(gl.getShaderInfoLog(fs));
}

let oldFsSource = null;

const parse = s => {
  const tokens = [];
  const ops = [];
  const line = [];
  let inComment = false;
  for (const [chunk] of (s + '\n').matchAll(/(\s+|#|\S+)/g)) {
    if (chunk === '#') {
      inComment = true;
      continue;
    }
    const tok = getToken(chunk);
    if (inComment) {
      if (tok.breaksLine)
        inComment = false;
      else
        continue;
    }
    if (tok.type === 'whitespace') {
      if (tok.breaksLine) {
        if (line.length && line[0].type == 'directive') {
          if (line[0].value === 'def') {
            ops.push({
              type: 'define',
              name: line[1].value,
              ops: line.slice(2),
            });
          } else if (line[0].value === 'fn') {
            const name = line[1].value;
            const glName = name.match(/^[^.]+/);
            const arity = line[2].value;
            ops.push({
              type: 'define',
              name,
              ops: [{ type: 'native', fn: stack => {
                stack.push(`${glName}(${stack.splice(stack.length-arity, arity).join(', ')})`);
              }}],
            });
          } else {
            throw new Error('bad directive');
          }
        } else {
          ops.push(...line);
        }
        line.length = 0;
      }
    } else {
      line.push(tok);
    }
  }
  return ops;
}

let runContinuously = true;
let timeVelocity = 1;
let t = 0;
let startTime = sessionStorage.startTime;
if (!startTime)
  startTime = sessionStorage.startTime = +new Date();
let tref = startTime;
let running = false;

const kickstart = () => {
  timeVelocity = Math.max(timeVelocity, 1);
  if (!running) {
    requestAnimationFrame(handleAnimationFrame);
    running = true;
  }
}

const handleAnimationFrame = () => {
  const now = +new Date();
  if (timeVelocity === 1) {
    t += now - tref;
  } else if (timeVelocity < 0.05) {
    timeVelocity = 0;
  } else {
    t += (now - tref) * timeVelocity
  }
  tref = now;
  if (!runContinuously && timeVelocity > 0)
    timeVelocity *= 0.99;

  draw(t/1000);
  if (!timeVelocity) {
    running = false;
  } else {
    requestAnimationFrame(handleAnimationFrame);
  }
}

kickstart();


const compile = parseTree => {
  let uniform_seq = 0;
  let tasks = [];
  let stack = [];
  const defs = {
    t: [{ type: 'native', fn: stack => { stack.push("t"); }}],
    p: [{ type: 'native', fn: stack => { stack.push("p"); }}],
    aspect: [{ type: 'native', fn: stack => { stack.push("aspect"); }}],
    PI: [{ type: 'native', fn: stack => { stack.push("PI"); }}],
    draw: [{ type: 'native', fn: stack => {
      tasks.push({
        type: 'draw',
        frag: `gl_FragColor = ${stack.pop()};`,
      });
      }}],
    x4: [{ type: 'native', fn: stack => {
      for (let i = 0; i < 4; i++)
        stack.push(stack[stack.length-1]);
    }}],
    tvel: [{ type: 'native', fn: stack => {
      timeVelocity = stack.pop();
      kickstart();
    }}],
    sf: [{ type: 'native', fn: stack => {
      if (!globals.audioAnalyser)
        globals.audioAnalyser = createAudioAnalyser();
      const bucketStr = stack.pop();
      const bucketNumber = +bucketStr;
      const u_name = `u_${uniform_seq++}`;
      if (isNaN(bucketNumber)) {
      } else {
        tasks.push({
          type: 'set_uniform',
          name: u_name,
          valueType: 'float',
          get value() {
            return globals.audioAnalyser.byteFreqData[bucketNumber]/255;
          }
        });
      }
      stack.push(u_name);
    }}],
  };
  const doOps = ops => {
    for (const op of ops) {
      if (op.type === 'define') {
        defs[op.name] = op.ops;
      } else if (op.type === 'operator') {
        stack.push(`(${[stack.pop(), op.value, stack.pop()].reverse().join(' ')})`);
      } else if (op.type === 'number') {
        let ns = op.value.toString();
        if (ns.indexOf('.') === -1)
          ns += '.';
        stack.push(ns);
      } else if (op.type === 'word') {
        const def = defs[op.value];
        if (def) {
          doOps(def);
        } else {
          throw new Error(`"${op.value}" is not defined.`);
        }
      } else if (op.type === 'native') {
        op.fn(stack);
      } else if (op.type === 'swizzle') {
        stack.push(`(${stack.pop()}).${op.components}`);
      } else if (op.type === 'assign') {
        const v = stack.pop();
        defs[op.name] = [{ type: 'native', fn: stack => { stack.push(v); }}];
      } else {
        throw new Error('idk what this thing is: ' + JSON.stringify(op));
      }
    }
  };
  doOps(parseTree);
  // console.log('complied to:', defs, stack, source);
  return tasks;
  // ${source}`;
}

const updateFrag = () => {
  const newParseTree = parse(ta.value);
  // console.log(newParseTree);
  const newTasks = compile(newParseTree);

  let pendingUniforms = {
    t: {
      valueType: 'float',
      get value() {
        return t/1000;
      }
    },
    aspect: {
      valueType: 'float',
      get value() {
        return gl.drawingBufferWidth / gl.drawingBufferHeight;
      }
    },
  };
  let currentProg = null;

  const newRuntimeTasks = [];
  for (const task of newTasks) {
    if (task.type == 'draw') {
      let defs = "";
      const uniforms = pendingUniforms;
      for (const k in uniforms) {
        const u = uniforms[k];
        defs += `
          uniform ${u.valueType} ${k};
        `;
      }
      pendingUniforms = {};

      const prog = gl.createProgram();
      const shaderText = wrapFragShader(task.frag, defs);
      console.log(shaderText);
      const fs = compileFragShader(shaderText);
      gl.attachShader(prog, vs);
      gl.attachShader(prog, fs);
      gl.linkProgram(prog);
      if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
        console.log(gl.getProgramInfoLog(prog));
        return;
      }
      const pLoc = gl.getUniformLocation(prog, "p_in");
      newRuntimeTasks.push(() => {
        gl.useProgram(prog);
        currentProg = prog;

        for (const k in uniforms) {
          const u = uniforms[k];
          const loc = gl.getUniformLocation(prog, k);
          const v = u.value;
          gl.uniform1f(loc, u.value);
        }

        gl.enableVertexAttribArray(pLoc);
        gl.vertexAttribPointer(pLoc, 3, gl.FLOAT, false, 0, 0);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, mesh.length / 3);
      });
    } else if (task.type === 'set_uniform') {
      pendingUniforms[task.name] = {
        valueType: task.valueType,
        get value() { return task.value; }
      };
    }
  }
  runtimeTasks = newRuntimeTasks;
  return;

  /*
  const newProgram = gl.createProgram();
  const newShaderText = preprocessFragShader(newShaderSource);
  const fs = compileFragShader(wrapFragShader(newShaderText))
  const fadeFsText = (oldFsSource !== null) && wrapFragShader(`
    gl_FragColor = vec4(0.);
    a();
    vec4 aColor = gl_FragColor;
    gl_FragColor = vec4(0.);
    b();
    vec4 bColor = gl_FragColor;
    gl_FragColor = mix(aColor, bColor, easeInOutQuad(clamp(t - ${(tref-startTime)/1000}, 0., 1.)));
    `, `
    void a() {
      ${oldFsSource}
    }

    void b() {
      ${newShaderText}
    }
  `);
  const fadeFs = fadeFsText ? compileFragShader(fadeFsText) : fs;

  if (!fadeFs)
    return;

  if (fadeFs != fs) {
    setTimeout(() => {
      gl.detachShader(newProgram, fadeFs);
      gl.attachShader(newProgram, fs);
      gl.linkProgram(newProgram);
    }, 1000);
  }
  */
  gl.attachShader(newProgram, vs);
  gl.attachShader(newProgram, fadeFs);
  gl.linkProgram(newProgram);
  if (!gl.getProgramParameter(newProgram, gl.LINK_STATUS)) {
    console.log(fadeFsText);
    console.log(gl.getProgramInfoLog(newProgram));
    return;
  }
  gl.useProgram(newProgram);
  program = newProgram;
  oldFsSource = newShaderText;
}

const resize = () => {
  c.width = c.clientWidth * devicePixelRatio;
  c.height = c.clientHeight * devicePixelRatio;
  gl.viewport(0, 0, gl.drawingBufferWidth, gl.drawingBufferHeight);
  draw();
};

window.addEventListener('resize', resize);
resize();

const getToken = text => {
  if (/\s+/.test(text))
    return { type: 'whitespace', breaksLine: text.indexOf('\n') != -1, text };
  const numberValue = +text;
  if (!isNaN(numberValue))
    return { type: 'number', value: numberValue };
  if (text[0] === ':')
    return { type: 'directive', text, value: text.substr(1) };
  if (/^\./.test(text))
    return { type: 'swizzle', text, components: text.substr(1) };
  if (/^=/.test(text))
    return { type: 'assign', text, name: text.substr(1) };
  if (!/^[a-zA-Z]/.test(text))
    return { type: 'operator', text, value: text };
  return { type: 'word', text, value: text };;
};

const transfer = () => {
  underlay.innerHTML = "";
  const bgEl = document.createElement('span');
  bgEl.textContent = ta.value;
  underlay.appendChild(bgEl);

  overlay.innerHTML = "";
  const chunks = parse(ta.value);
  for (const chunk of chunks) {
    const el = document.createElement('span');
    el.textContent = chunk.text;
    if (chunk.type === "number") {
      el.classList.add('number');
    }
      overlay.appendChild(el);
  }
  localStorage.prog = ta.value;
}

ta.addEventListener('keydown', e => {
  if (e.keyCode == 13 && e.metaKey) {
    e.preventDefault();
    window.dispatchEvent(new CustomEvent('sendbroadcast', { detail: ta.value }));
    return;
  }
});

ta.addEventListener('input', e => {
  transfer();
  updateFrag();
  kickstart();
});

if (prog) {
  document.body.classList.add('view');
  window.addEventListener('broadcast', e => {
    ta.value = e.detail;
    updateFrag();
  });
}

transfer();
updateFrag();

</script>
