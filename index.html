<!DOCTYPE html>
<meta name=viewport content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<style> body { background: black; } </style>
<link rel=stylesheet href=style.css>
<canvas id=c></canvas>
<div id=ed>
  <div id=toolbar>
    <ul class=tabs>
      <li>common</li>
      <li data-selected>project</li>
    </ul>
  </div>
  <div class=editor data-tab=common data-doc=common>
   <div class=underlay></div>
    <textarea class=ta spellcheck=false autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    <div class=overlay></div>
  </div>
  <div class=editor data-tab=project data-doc=proj>
    <div class=underlay></div>
    <textarea class=ta spellcheck=false autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    <div class=overlay></div>
  </div>
</div>
<div id=enableAudioContext>Give me some web audio</div>
<div id=errorZone>
  <div id=errorSummary></div>
  <div id=errorSource></div>
</div>
<script type=module>

import S4r from './S4r.js';

const c = document.getElementById('c');
const enableAudioContext = document.getElementById('enableAudioContext');

const hqs = location.hash
  .substr(1)
  .split('&')
  .filter(v => v)
  .map(c => c.split('=').map(decodeURIComponent))
  .reduce((params, [k, v]) => (params[k] = v, params), {});

const setHqs = (k, v) => {
  hqs[k] = v;
  location.replace(`#${Object.keys(hqs).map(k => [k, hqs[k]].map(encodeURIComponent).join('=')).join('&')}`);
};

const prog = 'id' in hqs;

const defaultProgs = {
  common: await fetch('common.s4r').then(r => r.text()).catch(() => ''),
  proj: `:def sceneDistance
  0 0 2 vec3 +
  t rotX
  t rotZ * transform
  0.4 vec3.1
  sdBox

fitp

0 0 -1 vec3 =direction

:def marchOnce 0 0 -1 vec3 * p + sceneDistance

0
:loop 40
 dup marchOnce 0 max +

3 / 2 pow
vec4.1 draw`,
};

const pads = {};
window.addEventListener('broadcast', e => {
  const {type} = e.detail;
  if (type != 'pad')
    return;
  const {which, pressed, x, y} = e.detail;
  pads[which] = { pressed, x, y };
});

const gl = c.getContext('webgl', {
  alpha: false,
  antialias: false,
  powerPreference: 'high-performance',
});
gl.enable(gl.BLEND);
gl.getExtension('OES_standard_derivatives');
gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);

let runContinuously = true;
let timeVelocity = 1;
let t = 0;
let startTime = sessionStorage.startTime;
if (!startTime)
  startTime = sessionStorage.startTime = +new Date();
let tref = startTime;
let running = false;

const kickstart = () => {
  if (running)
    return;
  requestAnimationFrame(handleAnimationFrame);
  running = true;
};

const handleAnimationFrame = () => {
  const now = +new Date();
  if (timeVelocity === 1) {
    t += now - tref;
  } else if (timeVelocity < 0.05) {
    timeVelocity = 0;
  } else {
    t += (now - tref) * timeVelocity;
  }
  tref = now;
  if (!runContinuously && timeVelocity > 0)
    timeVelocity *= 0.99;

  draw();
  if (!timeVelocity) {
    running = false;
  } else {
    requestAnimationFrame(handleAnimationFrame);
  }
};

const createAudioAnalyser = () => {
  const analyser = window.top.audioAnalyser || (() => {
    const ac = window.ac = new (window.AudioContext || window.webkitAudioContext)();
    let source;
    const checkState = () => {
      if (ac.state === 'suspended') {
        enableAudioContext.classList.add('visible');
        return;
      }

      enableAudioContext.classList.remove('visible');

      if (source)
        return;
      navigator.mediaDevices.getUserMedia({
        video: false,
        audio: {
          echoCancellation: false,
        },
      })
      .then(s => {
        source = ac.createMediaStreamSource(s);
        source.connect(analyser);
      });
    };
    enableAudioContext.addEventListener('click', e => {
      ac.resume();
    });

    ac.addEventListener('statechange', checkState);
    checkState();

    const analyser = ac.createAnalyser();
    analyser.smoothingTimeConstant = 0.3;
    try {
      analyser.fftSize = 4096;
      analyser.fftSize = 8192;
    } catch (e) {
      console.log('fft maxed out at', analyser.fftSize);
    }
    ac.resume();
    return analyser;
  })();

  const updateable = (obj, update) => {
    let lastUpdateTime = 0;
    return () => {
      let now = performance.now();
      if (lastUpdateTime != now) {
        update(obj);
        lastUpdateTime = now;
      }
      return obj;
    };
  };

  const kMaxFrequency = 20000;
  const getByteFreqData = updateable(new Uint8Array(Math.floor(kMaxFrequency / window.top.ac.sampleRate * (analyser.fftSize / 2))), data => {
    analyser.getByteFrequencyData(data);
  });
  const getByteTimeData = updateable(new Uint8Array(2048), data => {
    analyser.getByteTimeDomainData(data);
  });

  return {
    analyser,
    get byteFreqData() { return getByteFreqData(); },
    get byteTimeData() { return getByteTimeData(); },
  };
};

const globals = {
  framebuffers: {},
  midi: new Proxy({}, {
    get(obj, k) { return obj[k] || 0; }
  }),
  pads,
  audioAnalyser: null,
  createAudioAnalyser,
  get t() { return t / 1000; },
  kickstart,
  setTimeVelocity(v) { timeVelocity = v; },
};

const s4r = new S4r(gl, globals);

const draw = () => {
  s4r.draw();
};

const resize = () => {
  c.width = c.clientWidth * devicePixelRatio;
  c.height = c.clientHeight * devicePixelRatio;
  gl.viewport(0, 0, gl.drawingBufferWidth, gl.drawingBufferHeight);
  draw();
};

window.addEventListener('resize', resize);
resize();

const initEditor = (rootEl, cb) => {
  const ta = rootEl.querySelector('.ta');
  const underlay = rootEl.querySelector('.underlay');
  const overlay = rootEl.querySelector('.overlay');
  const key = rootEl.dataset.doc;

  const transfer = () => {
    ta.style.height = `1px`;
    ta.style.height = `${ta.scrollHeight}px`;
    underlay.style.height = `${ta.scrollHeight}px`;
    overlay.style.height = `${ta.scrollHeight}px`;

    underlay.innerHTML = "";
    for (const line of ta.value.split('\n')) {
      if (line) {
        const bgEl = document.createElement('span');
        bgEl.textContent = line;
        underlay.appendChild(bgEl);
      }
      underlay.appendChild(document.createTextNode('\n'));
    }

    overlay.innerHTML = "";
    const el = document.createElement('span');
    el.textContent = ta.value;
    overlay.appendChild(el);
    if (key !== 'common') {
      localStorage[key] = ta.value;
      setHqs(key, ta.value);
    }
  };

  rootEl.addEventListener('click', e => {
    if (e.target === rootEl) ta.focus();
  });

  ta.addEventListener('input', e => {
    transfer();
    cb();
  });

  if (key == 'common')
    ta.value = defaultProgs[key] || '';
  else
    ta.value = hqs[key] || localStorage[key] || defaultProgs[key] || '';
  transfer();

  return {
    get name() { return key; },
    get value(){ return ta.value; },
    set value(v){ ta.value = v; this.poke(); },
    poke() { transfer(); },
  };
};

const errorZone = document.getElementById('errorZone');
const errorSummary = document.getElementById('errorSummary');
const errorSource = document.getElementById('errorSource');

const showError = e => {
  errorZone.classList.toggle('visible', !!e);
  if (!e) return;
  errorSummary.textContent = `${e.message}:\n${e.infoLog ?? ''}`;
  errorSource.textContent = '';
  if (!e.shaderSource) return;
  for (const line of e.shaderSource.split('\n')) {
    const lineEl = document.createElement('div');
    lineEl.textContent = line;
    errorSource.appendChild(lineEl);
  }
  const m = e.infoLog && e.infoLog.match(/ERROR: 0:(\d+):/);
  if (m) {
    const interestingLine = errorSource.children[+m[1] - 1];
    if (interestingLine) {
      interestingLine.classList.add('interesting');
      interestingLine.scrollIntoView();
    }
  }
};

let errorDebounce = null;
const editors = [];
const onEditorChanged = () => {
  s4r.update(editors.map(e => e.value).join('\n'));
  if (!s4r.error) {
    clearTimeout(errorDebounce);
    showError(null);
  } else {
    clearTimeout(errorDebounce);
    errorDebounce = setTimeout(() => showError(s4r.error), 200);
  }
  kickstart();
};
for (const el of document.querySelectorAll('.editor'))
  editors.push(initEditor(el, onEditorChanged));
onEditorChanged();

const initTabs = (rootEl, tabChanged) => {
  const updateVisibility = () => {
    for (const tabEl of rootEl.children) {
      const targetEl = document.querySelector(`[data-tab=${tabEl.textContent}`);
      if ('selected' in tabEl.dataset)
        targetEl.dataset.tabSelected = '';
      else
        delete targetEl.dataset.tabSelected;
    }
  };
  updateVisibility();
  for (const tabEl of rootEl.children) {
    tabEl.addEventListener('mousedown', e => {
      e.preventDefault();
      if ('selected' in tabEl.dataset)
        return;
      const selectedTab = rootEl.querySelector('[data-selected]');
      if (selectedTab)
        delete selectedTab.dataset.selected;
      tabEl.dataset.selected = '';
      updateVisibility();
      tabChanged();
    });
  }
};
const selectedTabChanged = () => {
  for (const ed of editors)
    ed.poke();
};
for (const el of document.querySelectorAll('.tabs'))
  initTabs(el, selectedTabChanged);
selectedTabChanged();

for (const el of document.querySelectorAll('.fullscreenButton')) {
  el.addEventListener('click', () => {
    (c.requestFullscreen || c.webkitRequestFullscreen).call(c);
  });
}

if (prog) {
  document.body.classList.add('view');
  window.addEventListener('broadcast', e => {
    let touched = false;
    for (const ed of editors) {
      if (ed.name != e.detail.name)
        continue;
      ed.value = e.detail.value;
      touched = true;
    }
    if (touched)
      onEditorChanged();
  });
}

window.addEventListener('broadcast', e => {
  const {type, value} = e.detail;
  if (type != 'midi')
    return;
  for (const k in value) {
    if(globals.midi[k] != value[k])
        console.log('midibutt', k, value[k]);
  }
  Object.assign(globals.midi, value);
});

if ("serviceWorker" in navigator)
  navigator.serviceWorker.register("/sw.js");

</script>
